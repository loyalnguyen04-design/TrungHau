<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OVN479 200 ống giấy đôi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

/* BACKGROUND 4K */

.anime-bg{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background-image:url("https://images.unsplash.com/photo-1519681393784-d120267933ba");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

z-index:-1;

}

/* BODY */

body{

min-height:100vh;
display:flex;
justify-content:center;
padding:40px;

}

/* PANEL */

.container{
width:900px;
max-width:95%;
}

.top-panel{

background:rgba(255,255,255,0.15);
backdrop-filter:blur(6px);

border-radius:20px;
padding:30px;

box-shadow:0 10px 40px rgba(0,0,0,0.4);

color:white;

}

h2{
text-align:center;
margin-bottom:25px;
}

/* FORM */

.form-row{

display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
align-items:flex-end;

}

.field{
display:flex;
flex-direction:column;
min-width:160px;
}

label{
font-size:13px;
margin-bottom:5px;
}

input{

padding:11px;
border-radius:10px;
border:none;

}

/* BUTTON */

button{

padding:12px 22px;
border:none;
border-radius:12px;

font-weight:bold;
cursor:pointer;

transition:0.3s;

}

.generate{

background:linear-gradient(45deg,#7c4dff,#00e5ff);
color:white;

}

.generate:hover{
transform:scale(1.1);
}

.print{

background:linear-gradient(45deg,#ff4081,#ff80ab);
color:white;

}

/* PREVIEW COUNT */

#previewCount{

margin-top:15px;
text-align:center;
font-weight:bold;

}

/* PREVIEW TEM */

.preview{

margin-top:20px;
background:white;
border-radius:10px;
padding:10px;

}

.preview table{
width:100%;
border-collapse:collapse;
}

.preview td{

border:1px solid black;
height:40px;
text-align:center;
font-weight:bold;

}

/* PRINT TABLE */

.page{
page-break-after:always;
margin-top:20px;
}

.print-table{

width:100%;
border-collapse:collapse;
background:white;

}

.print-table td{

border:1px solid black;
height:45px;
text-align:center;
font-size:28px;
font-weight:bold;
width:25%;

}

/* SAKURA */

.sakura{

position:fixed;
top:-40px;
font-size:20px;

animation:fall linear infinite;

}

@keyframes fall{

to{
transform:translateY(110vh) rotate(360deg);
}

}

/* PARTICLE */

.particle{

position:fixed;

width:3px;
height:3px;

background:white;
border-radius:50%;

animation:float 8s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

/* PRINT MODE */

@media print{

body *{
visibility:hidden;
}

#result,#result *{
visibility:visible;
}

#result{
position:absolute;
top:0;
left:0;
width:100%;
}

.top-panel{
display:none;
}

}

</style>
</head>

<body>

<div class="anime-bg"></div>

<div class="container">

<div class="top-panel">

<h2>OVN 479 (200+200)*8</h2>

<div class="form-row">

<div class="field">
<label>LotNo</label>
<input type="text" id="lotNo" value="5G0101">
</div>

<div class="field">
<label>Tay bắt đầu</label>
<input type="number" id="startCuon" value="1" oninput="updatePreview()">
</div>

<div class="field">
<label>Tay kết thúc</label>
<input type="number" id="endCuon" value="4" oninput="updatePreview()">
</div>

<button class="generate" onclick="taoLot()">TẠO</button>
<button class="print" onclick="window.print()">IN TEM</button>

</div>

<div id="previewCount">Số tem dự kiến: 0</div>

<div class="preview">
<table id="previewTable"></table>
</div>

</div>

<div id="result"></div>

</div>

<script>

/* PREVIEW COUNT */

function updatePreview(){

const start=parseInt(document.getElementById('startCuon').value)||0;
const end=parseInt(document.getElementById('endCuon').value)||0;

let cuon=end-start+1;
if(cuon<0) cuon=0;

let total=cuon*5;

document.getElementById("previewCount").innerText="Số tem dự kiến: "+total;

}

/* GENERATE */

function taoLot(){

const lotNo=document.getElementById('lotNo').value.trim();
const startCuon=parseInt(document.getElementById('startCuon').value);
const endCuon=parseInt(document.getElementById('endCuon').value);

let allLabels=[];

for(let cuon=startCuon;cuon<=endCuon;cuon++){

let cuonStr=String(cuon).padStart(2,'0');

allLabels.push(lotNo+cuonStr+"/01-06");
allLabels.push(lotNo+cuonStr+"/07-12");
allLabels.push(lotNo+cuonStr+"/13-14");
allLabels.push(lotNo+cuonStr+"/15-16");

}

render(allLabels);

}

/* RENDER */

function render(allLabels){

const rowsPerCol=20;
const colsPerPage=3;
const labelsPerPage=rowsPerCol*colsPerPage;

let html="";

for(let pageStart=0;pageStart<allLabels.length;pageStart+=labelsPerPage){

html+='<div class="page"><table class="print-table">';

for(let row=0;row<rowsPerCol;row++){

html+="<tr>";

for(let col=0;col<colsPerPage;col++){

let index=pageStart+col*rowsPerCol+row;

html+="<td>"+(allLabels[index]||"")+"</td>";

}

html+="</tr>";

}

html+="</table></div>";

}

document.getElementById("result").innerHTML=html;

}

/* SAKURA (ít để mượt) */

for(let i=0;i<8;i++){

let s=document.createElement("div");
s.className="sakura";
s.innerHTML="**";

s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(s);

}

/* PARTICLE */

for(let i=0;i<10;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(p);

}

updatePreview();

</script>

</body>
</html>
