<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LotNo By Trung Hau</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
padding:30px;
color:#fff;
}

.top-panel{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:18px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
margin-bottom:30px;
border:1px solid rgba(255,215,0,0.3);
}

.top-panel h2{
margin-bottom:15px;
color:#ffd700;
letter-spacing:2px;
}

.form-row{
display:flex;
gap:15px;
flex-wrap:wrap;
align-items:flex-end;
}

.field{
display:flex;
flex-direction:column;
flex:1;
min-width:140px;
}

label{
font-size:12px;
margin-bottom:5px;
opacity:0.9;
}

input{
padding:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:14px;
}

input:focus{
outline:none;
background:rgba(255,255,255,0.3);
transform:scale(1.05);
}

button{
padding:11px 18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.generate{
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
}

.print{
background:linear-gradient(135deg,#f7971e,#ffd200);
color:black;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.page{ page-break-after:always; }

.print-table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
table-layout:fixed;
}

.print-table td{
border:1px solid #000;
height:40px;
text-align:center;
font-size:20px;
font-weight:bold;
width:25%;
}

@media print{
body *{ visibility:hidden; }
#result,#result *{ visibility:visible; }

#result{
position:absolute;
top:0;
left:0;
width:100%;
}
}
</style>
</head>

<body>

<div class="top-panel">
<h2>Tạo lotno OVN479(200+200)*8R</h2>

<div class="form-row">

<div class="field">
<label>LotNo</label>
<input type="text" id="lotNo" value="5G0101">
</div>

<div class="field">
<label>Tay bắt đầu</label>
<input type="number" id="startCuon" value="1">
</div>

<div class="field">
<label>Tay kết thúc</label>
<input type="number" id="endCuon" value="4">
</div>

<div class="field">
<label>Roll mỗi tay</label>
<input type="number" id="rollPerCuon" value="16">
</div>

<div class="field">
<label>Đóng Roll/Pack</label>
<input type="number" id="quyCach" value="6">
</div>

<button class="generate" onclick="taoLot()">TẠO</button>
<button class="print" onclick="window.print()">In Tem</button>

</div>
</div>

<div id="result"></div>

<script>

function taoLot(){

const lotNo = document.getElementById('lotNo').value.trim();
const startCuon = parseInt(document.getElementById('startCuon').value);
const endCuon = parseInt(document.getElementById('endCuon').value);

let allLabels=[];

for(let cuon=startCuon;cuon<=endCuon;cuon++){

let cuonStr=String(cuon).padStart(2,'0');

allLabels.push(lotNo+cuonStr+"/01-06");
allLabels.push(lotNo+cuonStr+"/07-12");
allLabels.push(lotNo+cuonStr+"/13-14");
allLabels.push(lotNo+cuonStr+"/15-16");
allLabels.push(lotNo+cuonStr+"/13-16");

}

render(allLabels);

}

function render(allLabels){

const rowsPerCol=24;
const colsPerPage=4;
const labelsPerPage=rowsPerCol*colsPerPage;

let html="";

for(let pageStart=0;pageStart<allLabels.length;pageStart+=labelsPerPage){

html+='<div class="page"><table class="print-table">';

for(let row=0;row<rowsPerCol;row++){

html+="<tr>";

for(let col=0;col<colsPerPage;col++){

let index=pageStart+col*rowsPerCol+row;
html+="<td>"+(allLabels[index]||"")+"</td>";

}

html+="</tr>";
}

html+="</table></div>";

}

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
