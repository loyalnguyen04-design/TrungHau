<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tem Giay</title>

<style>
/* ===== HIỆU ỨNG THIÊN NHIÊN (LÁ TRÚC BAY CHÉO) ===== */
.bamboo-leaf {
  position: fixed; z-index: 9999;
  user-select: none; pointer-events: none;
  animation: fallDiagonally linear infinite;
  color: #4f772d; opacity: 0;
}

@keyframes fallDiagonally {
  0% { 
    transform: translate(0, 0) rotate(0deg); 
    top: var(--start-y); 
    left: var(--start-x); 
    opacity: 0; 
  }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { 
    transform: translate(100vw, 100vh) rotate(1080deg); 
    top: var(--start-y); 
    left: var(--start-x); 
    opacity: 0; 
  }
}

/* ===== GIAO DIỆN CHUNG ===== */
body {
  margin: 0; font-family: 'Segoe UI', serif;
  background: #f1f8e9;
  background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), 
                    url('https://www.transparenttextures.com/patterns/natural-paper.png');
  color: #1b5e20;
  overflow-x: hidden;
}

.logo-nature {
  position: fixed; bottom: 25px; left: 30px; font-size: 28px; font-weight: 900;
  color: #2d6a4f; border-left: 5px solid #a7c957; padding-left: 10px;
  z-index: 9999; text-transform: uppercase;
}

.container {
  max-width: 650px; margin: 40px auto; padding: 30px;
  border-radius: 20px; background: #ffffff; 
  border: 2px solid #a7c957;
  box-shadow: 0 10px 30px rgba(45, 106, 79, 0.1);
  position: relative; z-index: 10; overflow: hidden;
}

.container::before {
  content: '🎋'; position: absolute; top: -10px; right: -10px; 
  font-size: 80px; opacity: 0.1; transform: rotate(15deg);
}

h2 { 
  text-align: center; margin-top: 0; color: #386641; 
  text-transform: uppercase; letter-spacing: 2px;
  border-bottom: 2px dashed #bc6c25; padding-bottom: 10px;
}

.grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

label { display: block; margin-top: 10px; font-size: 13px; font-weight: 600; color: #606c38; }

input {
  width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box;
  border-radius: 8px; border: 1px solid #ccd5ae; 
  background: #fefae0; color: #283618; outline: none;
}

button {
  width: 100%; margin-top: 20px; padding: 14px; border-radius: 50px;
  border: none; font-weight: bold; cursor: pointer; transition: 0.4s;
  text-transform: uppercase;
}
.btn-main { background: linear-gradient(135deg, #6a994e, #386641); color: white; }
.btn-print { background: transparent; color: #bc6c25; margin-top: 15px; border: 2px solid #bc6c25; }

#result { background: white; color: black; position: relative; z-index: 5; }
.page { page-break-after: always; padding: 20px; }
.print-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.print-table td {
  border: 1px solid #000; text-align: center; vertical-align: middle;
  word-break: break-all; padding: 5px; font-weight: bold;
}

@media print {
  body * { visibility: hidden; }
  #result, #result * { visibility: visible; }
  #result { position: absolute; top: 0; left: 0; width: 100%; }
  .bamboo-leaf, .logo-nature { display: none !important; }
}
</style>
</head>

<body>

<div class="logo-nature">Trung Hậu</div>

<div class="container">
  <h2>🌿 Tem Giấy 🌿</h2>
  
  <label>Mã LotNo:</label>
  <input type="text" id="lotNo" value="5G0101">

  <div class="grid-inputs">
    <div>
      <label>Số Tay bắt đầu:</label>
      <input type="number" id="startCuon" value="1">
    </div>
    <div>
      <label>Số Tay kết thúc:</label>
      <input type="number" id="endCuon" value="1">
    </div>
    <div>
      <label>Số roll/Tay:</label>
      <input type="number" id="rollPerCuon" value="10">
    </div>
    <div>
      <label>Số roll/tem:</label>
      <input type="number" id="quyCach" value="1">
    </div>
  </div>

  <hr style="border: 0; height: 1px; background: #ccd5ae; margin: 25px 0;">

  <div class="grid-inputs">
    <div>
      <label>Số cột (ngang):</label>
      <input type="number" id="inputCols" value="3">
    </div>
    <div>
      <label>Số dòng (dọc):</label>
      <input type="number" id="inputRows" value="20">
    </div>
    <div>
      <label>Cỡ chữ (px):</label>
      <input type="number" id="fontSize" value="25">
    </div>
    <div>
      <label>Chiều cao ô (px):</label>
      <input type="number" id="cellHeight" value="44">
    </div>
  </div>

  <button class="btn-main" onclick="taoLot()">KHỞI TẠO BẢN IN</button>
  <button class="btn-print" onclick="window.print()">XUẤT FILE IN</button>
</div>

<div id="result"></div>

<script>
// Hiệu ứng lá tre bay chéo
function createLeaf() {
  const leaf = document.createElement('div');
  leaf.classList.add('bamboo-leaf');
  leaf.innerHTML = '🍃'; 
  let startX, startY;
  if (Math.random() > 0.5) {
    startY = '-50px'; startX = Math.random() * 100 + 'vw';
  } else {
    startX = '-50px'; startY = Math.random() * 100 + 'vh';
  }
  const duration = Math.random() * 8 + 6 + 's'; 
  const size = Math.random() * 15 + 12 + 'px';
  leaf.style.setProperty('--start-x', startX);
  leaf.style.setProperty('--start-y', startY);
  leaf.style.animationDuration = duration;
  leaf.style.fontSize = size;
  document.body.appendChild(leaf);
  setTimeout(() => leaf.remove(), 15000);
}
setInterval(createLeaf, 700);

// LOGIC ĐÃ CẬP NHẬT: Tự động ẩn dấu "~" nếu chỉ có 1 roll cuối
function taoLot() {
  const lotNo = document.getElementById('lotNo').value.trim();
  const startCuon = parseInt(document.getElementById('startCuon').value);
  const endCuon = parseInt(document.getElementById('endCuon').value);
  const rollPerCuon = parseInt(document.getElementById('rollPerCuon').value);
  const quyCach = parseInt(document.getElementById('quyCach').value);
  
  const colsPerPage = parseInt(document.getElementById('inputCols').value);
  const rowsPerCol = parseInt(document.getElementById('inputRows').value);
  const fSize = document.getElementById('fontSize').value + "px";
  const cHeight = document.getElementById('cellHeight').value + "px";

  if (!lotNo) { alert("Vui lòng nhập LotNo"); return; }

  let allLabels = [];
  for (let cuon = startCuon; cuon <= endCuon; cuon++) {
    let cuonStr = String(cuon).padStart(2, '0');
    let rollCounter = 1;
    while (rollCounter <= rollPerCuon) {
      let start = rollCounter;
      let end = Math.min(rollCounter + quyCach - 1, rollPerCuon);
      
      // Kiểm tra: Nếu start bằng end thì chỉ hiện 1 số
      if (start === end) {
        allLabels.push(lotNo + cuonStr + "/" + String(start).padStart(2, '0'));
      } else {
        allLabels.push(lotNo + cuonStr + "/" + String(start).padStart(2, '0') + "~" + String(end).padStart(2, '0'));
      }
      
      rollCounter = end + 1;
    }
  }

  const labelsPerPage = rowsPerCol * colsPerPage;
  let resultHTML = "";

  for (let pageStart = 0; pageStart < allLabels.length; pageStart += labelsPerPage) {
    resultHTML += '<div class="page"><table class="print-table">';
    for (let row = 0; row < rowsPerCol; row++) {
      resultHTML += `<tr style="height: ${cHeight}">`;
      for (let col = 0; col < colsPerPage; col++) {
        let index = pageStart + (col * rowsPerCol) + row;
        resultHTML += `<td style="font-size: ${fSize}">${allLabels[index] || ""}</td>`;
      }
      resultHTML += "</tr>";
    }
    resultHTML += "</table></div>";
  }

  document.getElementById("result").innerHTML = resultHTML;
  if(allLabels.length > 0) {
    window.scrollTo({ top: document.getElementById('result').offsetTop, behavior: 'smooth' });
  }
}
</script>

</body>
</html>
