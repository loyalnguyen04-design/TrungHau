<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lot Generator VIP Luxury</title>

<style>
/* ===== LOGO GÓC PHẢI ===== */
.logo-fixed {
  position: fixed;
  bottom: 20px;
  left: 30px;
  font-size: 42px;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow:
    0 0 10px rgba(255,215,0,0.8),
    0 0 20px rgba(255,215,0,0.6),
    0 0 30px rgba(255,215,0,0.4);
  opacity: 0.9;
  pointer-events: none;
  z-index: 999;
}

/* Không in logo */
@media print {
  .logo-fixed {
    display: none !important;
  }
}
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: #f5d27a;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 1100px;
  margin: 40px auto;
  padding: 35px;
  background: linear-gradient(145deg, #111, #1c1c1c);
  border-radius: 16px;
  border: 1px solid #c9a227;
  box-shadow: 0 0 40px rgba(201,162,39,0.3);
}

/* ===== HEADER ===== */
.header {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 25px;
  text-align: center;
  letter-spacing: 1px;
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}

/* ===== FORM GRID ===== */
.form-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-bottom: 25px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 13px;
  margin-bottom: 6px;
  color: #e6c35c;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #c9a227;
  background: #111;
  color: #ffd700;
  font-weight: 600;
  outline: none;
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

/* ===== BUTTON ===== */
button {
  padding: 10px 22px;
  border-radius: 8px;
  border: none;
  font-weight: 700;
  cursor: pointer;
  margin-right: 12px;
  background: linear-gradient(145deg, #d4af37, #b8860b);
  color: black;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(255,215,0,0.6);
}

.print-btn {
  background: linear-gradient(145deg, #ffd700, #c9a227);
}

/* ===== TABLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  margin-top: 25px;
}

td {
  border: 1px solid #c9a227;
  width: 20%;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  height: 32px;
  padding: 0;
  color: #ffd700;
}

.page {
  margin-bottom: 30px;
}

/* ===== IN A4 ===== */
@media print {

  @page {
    size: A4;
    margin: 0mm;
  }

  body {
    background: white;
    color: black;
  }

  .container {
    box-shadow: none;
    border: none;
    margin: 0;
    padding: 0;
  }

  .form-grid,
  .header,
  button {
    display: none;
  }

  td {
    border: 1px solid #000;
    color: black;
    font-size: 22px;
    height: 30px;
  }

  .page {
    page-break-after: always;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header"> Tạo Lotno Tem Lõi </div>

<div class="form-grid">
  <div class="form-group">
    <label>Lot gốc</label>
    <input type="text" id="baseLot" value="5G0101">
  </div>

  <div class="form-group">
    <label>Cuộn bắt đầu</label>
    <input type="number" id="startCoil" value="1">
  </div>

  <div class="form-group">
    <label>Cuộn kết thúc</label>
    <input type="number" id="endCoil" value="20">
  </div>

  <div class="form-group">
    <label>Số roll / cuộn</label>
    <input type="number" id="rollCount" value="3">
  </div>
</div>

<button onclick="generate()">Tạo Lot</button>
<button class="print-btn" onclick="window.print()">In</button>

<div id="result"></div>

</div>

<script>

function generate() {

  const columns = 5;
  const rowsPerColumn = 32;

  let baseLot = document.getElementById("baseLot").value.trim();
  let startCoil = parseInt(document.getElementById("startCoil").value);
  let endCoil = parseInt(document.getElementById("endCoil").value);
  let rollCount = parseInt(document.getElementById("rollCount").value);

  let coils = [];

  for (let coil = startCoil; coil <= endCoil; coil++) {
    let coilData = [];

    for (let roll = 1; roll <= rollCount; roll++) {
      let coilStr = String(coil).padStart(2,'0');
      let rollStr = String(roll).padStart(2,'0');
      coilData.push(baseLot + coilStr + rollStr);
    }

    coils.push(coilData);
  }

  let pagesHTML = "";
  let currentPageColumns = Array.from({length: columns}, () => []);
  let currentCol = 0;
  let currentRows = 0;

  function pushPage() {
    pagesHTML += "<div class='page'><table>";
    for (let r = 0; r < rowsPerColumn; r++) {
      pagesHTML += "<tr>";
      for (let c = 0; c < columns; c++) {
        pagesHTML += `<td>${currentPageColumns[c][r] || ""}</td>`;
      }
      pagesHTML += "</tr>";
    }
    pagesHTML += "</table></div>";

    currentPageColumns = Array.from({length: columns}, () => []);
    currentCol = 0;
    currentRows = 0;
  }

  for (let coil of coils) {

    if (coil.length > rowsPerColumn) {
      alert("Số roll lớn hơn 32.");
      return;
    }

    if (currentRows + coil.length > rowsPerColumn) {
      currentCol++;
      currentRows = 0;
    }

    if (currentCol >= columns) {
      pushPage();
    }

    currentPageColumns[currentCol].push(...coil);
    currentRows += coil.length;
  }

  pushPage();

  document.getElementById("result").innerHTML = pagesHTML;
}

</script>

</body>
<div class="logo-fixed">Trung Hậu</div>
</html>
