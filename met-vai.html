<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Số Mét Vải - Giao Diện Lớn</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0;
            background-color: #fff5f5; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(220, 53, 69, 0.15); 
            width: 500px; /* Tăng độ rộng bảng */
            border: 2px solid #feb2b2; 
        }
        h2 { 
            text-align: center; 
            color: #c53030; 
            margin-bottom: 30px; 
            font-size: 28px; /* Tăng cỡ chữ tiêu đề */
            text-transform: uppercase;
        }
        .input-group { margin-bottom: 25px; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: bold; 
            color: #4a5568; 
            font-size: 18px; /* Tăng cỡ chữ nhãn */
        }
        input { 
            width: 100%; 
            padding: 15px; /* Tăng khoảng cách trong ô nhập */
            border: 2px solid #feb2b2; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 20px; /* Tăng cỡ chữ số nhập vào */
            color: #2d3748;
        }
        input:focus { 
            border-color: #f56565; 
            box-shadow: 0 0 8px rgba(245, 101, 101, 0.3); 
        }
        button { 
            width: 100%; 
            padding: 18px; 
            background-color: #dc3545; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 22px; /* Tăng cỡ chữ nút bấm */
            font-weight: bold; 
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover { 
            background-color: #b91c1c; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(185, 28, 28, 0.3);
        }
        .result { 
            margin-top: 30px; 
            padding: 20px; 
            background-color: #fff5f5; 
            border-left: 8px solid #dc3545; 
            font-weight: bold; 
            color: #9b2c2c; 
            font-size: 22px; /* Tăng cỡ chữ kết quả */
            text-align: center;
            border-radius: 0 10px 10px 0;
        }
        span#output { 
            font-size: 30px; /* Làm nổi bật số kết quả */
            color: #e53e3e; 
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Máy Tính Mét Vải</h2>
    
    <div class="input-group">
        <label for="weight">Khối lượng (kg):</label>
        <input type="number" id="weight" placeholder="0.0" step="0.1">
    </div>

    <div class="input-group">
        <label for="width">Khổ vải (mm):</label>
        <input type="number" id="width" placeholder="0" step="1">
    </div>

    <div class="input-group">
        <label for="gsm">Định lượng (gram/m²):</label>
        <input type="number" id="gsm" placeholder="0" step="1">
    </div>

    <button onclick="calculateMeters()">TÍNH KẾT QUẢ</button>

    <div id="result" class="result" style="display:none;">
        Số mét vải tính được:
        <span id="output">0</span> mét
    </div>
</div>

<script>
    function calculateMeters() {
        const weight = parseFloat(document.getElementById('weight').value);
        const widthMm = parseFloat(document.getElementById('width').value);
        const gsm = parseFloat(document.getElementById('gsm').value);
        const resultDiv = document.getElementById('result');
        const output = document.getElementById('output');

        if (weight > 0 && widthMm > 0 && gsm > 0) {
            const widthM = widthMm / 1000;
            const meters = (weight * 1000) / (gsm * widthM);
            
            // Hiển thị số mét với 2 chữ số thập phân
            output.innerText = meters.toLocaleString('vi-VN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            resultDiv.style.display = 'block';
        } else {
            alert("Vui lòng nhập đầy đủ các thông số hợp lệ!");
        }
    }
</script>

</body>
</html>
