<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OVN 21 Roll - 8/Pack Multi-Tay</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}
    .anime-bg{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("https://images.unsplash.com/photo-1519681393784-d120267933ba");background-size:cover;z-index:-1;}
    body{min-height:100vh;display:flex;justify-content:center;padding:40px;}
    .container{width:900px;max-width:95%;}
    .top-panel{background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);border-radius:20px;padding:30px;box-shadow:0 10px 40px rgba(0,0,0,0.4);color:white;}
    h2{text-align:center;margin-bottom:25px;}
    .form-row{display:flex;gap:15px;flex-wrap:wrap;justify-content:center;align-items:flex-end;}
    .field{display:flex;flex-direction:column;min-width:160px;}
    label{font-size:13px;margin-bottom:5px;}
    input{padding:11px;border-radius:10px;border:none;}
    button{padding:12px 22px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;transition:0.3s;}
    .generate{background:linear-gradient(45deg,#7c4dff,#00e5ff);color:white;}
    .print{background:linear-gradient(45deg,#ff4081,#ff80ab);color:white;margin-left:10px;}
    #previewCount{margin-top:15px;text-align:center;font-weight:bold;}
    #result{margin-top:20px;}
    .page{page-break-after:always;}
    .print-table{width:100%;border-collapse:collapse;background:white;margin-bottom:20px;}
    .print-table td{border:1px solid black;padding:5px 2px;height:70px;text-align:center;font-size:18px;font-weight:bold;line-height:1.2;width:25%;vertical-align: middle;}
    @media print{
        .top-panel{display:none;}
        body{padding:0;}
        .anime-bg{display:none;}
    }
</style>
</head>
<body>

<div class="anime-bg"></div>
<div class="container">
    <div class="top-panel">
        <h2>TẠO TEM 21 ROLL (DỒN 8 NHIỀU TAY)</h2>
        <div class="form-row">
            <div class="field">
                <label>LotNo</label>
                <input type="text" id="lotNo" value="5G0101">
            </div>
            <div class="field">
                <label>Tay bắt đầu</label>
                <input type="number" id="startCuon" value="1" oninput="updatePreview()">
            </div>
            <div class="field">
                <label>Tay kết thúc</label>
                <input type="number" id="endCuon" value="8" oninput="updatePreview()">
            </div>
            <button class="generate" onclick="taoLot()">TẠO</button>
            <button class="print" onclick="window.print()">IN TEM</button>
        </div>
        <div id="previewCount">Số tem dự kiến: 0</div>
    </div>
    <div id="result"></div>
</div>

<script>
function updatePreview(){
    const start = parseInt(document.getElementById('startCuon').value)||0;
    const end = parseInt(document.getElementById('endCuon').value)||0;
    let cuon = end - start + 1;
    if(cuon < 0) cuon = 0;
    let total = cuon * 2 + Math.ceil((cuon * 5) / 8);
    document.getElementById("previewCount").innerText = "Số tem dự kiến: " + total;
}

function taoLot(){
    const lotNo = document.getElementById('lotNo').value.trim();
    const startTay = parseInt(document.getElementById('startCuon').value);
    const endTay = parseInt(document.getElementById('endCuon').value);
    
    let allLabels = [];
    let pool = []; 

    for(let tay = startTay; tay <= endTay; tay++){
        let tayStr = String(tay).padStart(2, '0');
        
        // 1. Pack cố định 01-08 và 09-16
        allLabels.push(lotNo + tayStr + " /01-08");
        allLabels.push(lotNo + tayStr + " /09-16");

        // 2. Gom 5 roll lẻ (17-21) vào bể chứa
        for(let r = 17; r <= 21; r++){
            pool.push({tay: tayStr, roll: r});
        }

        // 3. Khi bể chứa đủ từ 8 roll trở lên, tạo tem dồn
        while(pool.length >= 8){
            let pack8 = pool.splice(0, 8);
            allLabels.push(formatMixedLabel(lotNo, pack8));
        }
    }

    // Xử lý phần dư cuối cùng nếu còn
    if(pool.length > 0){
        allLabels.push(formatMixedLabel(lotNo, pool));
    }

    render(allLabels);
}

// Hàm xử lý gom nhóm theo Tay để hiển thị nhiều dòng
function formatMixedLabel(lotNo, pack){
    let groups = {};
    pack.forEach(item => {
        if(!groups[item.tay]) groups[item.tay] = [];
        groups[item.tay].push(item.roll);
    });

    let lines = [];
    for(let tay in groups){
        let rolls = groups[tay];
        let range = rolls.length > 1 ? `${rolls[0]}-${rolls[rolls.length-1]}` : `${rolls[0]}`;
        lines.push(`${lotNo}${tay} /${range}`);
    }
    return lines.join("<br/>");
}

function render(allLabels){
    const rowsPerCol = 14; // Giảm số dòng mỗi cột vì tem dồn 3 tay sẽ cao hơn
    const colsPerPage = 4;
    const labelsPerPage = rowsPerCol * colsPerPage;
    let html = "";

    for(let pageStart = 0; pageStart < allLabels.length; pageStart += labelsPerPage){
        html += '<div class="page"><table class="print-table">';
        for(let row = 0; row < rowsPerCol; row++){
            html += "<tr>";
            for(let col = 0; col < colsPerPage; col++){
                let index = pageStart + col * rowsPerCol + row;
                html += "<td>" + (allLabels[index] || "") + "</td>";
            }
            html += "</tr>";
        }
        html += "</table></div>";
    }
    document.getElementById("result").innerHTML = html;
}

updatePreview();
</script>
</body>
</html>
