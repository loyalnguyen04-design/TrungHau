<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>OVN 21 Roll - 8/Pack Multi-Tay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --maple-red: #d94141;
            --dark-samurai: #080a09;
            --gold-leaf: #daa520;
            --glass-white: rgba(255, 255, 255, 0.15);
            --border-dusk: rgba(184, 134, 11, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Serif JP", serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px;
            /* Hình nền đồng bộ */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.2)), url("mybackground.jpg") center/cover no-repeat fixed;
            color: #fff;
            overflow-x: hidden;
        }

        /* Container lá phong */
        #maple-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 900px;
            max-width: 95%;
            position: relative;
            z-index: 2;
        }

        .top-panel {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-dusk);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h2 {
            font-family: "Cinzel", serif;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 15px rgba(218, 165, 32, 0.5);
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
        }

        .field {
            display: flex;
            flex-direction: column;
            min-width: 160px;
        }

        label {
            font-size: 13px;
            margin-bottom: 8px;
            color: #eee;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            padding: 11px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate {
            background: var(--maple-red);
            color: white;
            box-shadow: 0 4px 15px rgba(217, 65, 65, 0.3);
        }

        .generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 65, 65, 0.5);
        }

        .print {
            background: #444;
            color: white;
            margin-left: 10px;
            border: 1px solid var(--border-dusk);
        }

        #previewCount {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: var(--gold-leaf);
        }

        #result {
            margin-top: 30px;
        }

        .page {
            page-break-after: always;
            background: white; /* Giữ nền trắng khi in */
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .print-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .print-table td {
            border: 2px solid black;
            padding: 5px 2px;
            height: 70px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.2;
            width: 25%;
            vertical-align: middle;
            color: #000;
        }

        /* Hiệu ứng lá phong từ Index */
        .leaf {
            position: absolute;
            fill: var(--maple-red);
            filter: drop-shadow(0 0 5px rgba(217, 65, 65, 0.5));
            animation: fall linear infinite, sway ease-in-out infinite;
        }

        @keyframes fall {
            0% { transform: translate(0, -60px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { transform: translate(70vw, 100vh) rotate(1000deg); opacity: 0; }
        }

        @keyframes sway {
            0%, 100% { margin-left: 0; }
            50% { margin-left: 60px; }
        }

        @media print {
            .top-panel, #maple-container { display: none; }
            body { background: white; padding: 0; }
            .container { width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="maple-container"></div>

<div class="container">
    <div class="top-panel">
        <h2>TẠO TEM 21 ROLL</h2>
        <div class="form-row">
            <div class="field">
                <label>LotNo</label>
                <input type="text" id="lotNo" value="5G0101">
            </div>
            <div class="field">
                <label>Tay bắt đầu</label>
                <input type="number" id="startCuon" value="1" oninput="updatePreview()">
            </div>
            <div class="field">
                <label>Tay kết thúc</label>
                <input type="number" id="endCuon" value="8" oninput="updatePreview()">
            </div>
            <button class="generate" onclick="taoLot()">TẠO TEM</button>
            <button class="print" onclick="window.print()">IN TEM</button>
        </div>
        <div id="previewCount">Số tem dự kiến: 0</div>
    </div>
    <div id="result"></div>
</div>

<script>
    // Script hiệu ứng lá rơi từ Index
    function createMapleLeaf() {
        const container = document.getElementById('maple-container');
        if(!container) return;

        const leaf = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        leaf.setAttribute("class", "leaf");
        leaf.setAttribute("viewBox", "0 0 512 512");
        leaf.innerHTML = `<path d="M499.7,219.1c-12.8-19.1-39.1-23.7-58.8-11.4c-4.4,2.8-8.2,6.4-11.3,10.6c-4.9-20.1-17.7-38.1-36.1-49.9 c-24.3-15.6-56.1-13.6-78.5,4c-1.3,1-2.5,2.1-3.7,3.3c0.1-4.8,0.1-9.6-0.2-14.3c-1.2-28.8-21.7-53.1-48.4-58 c-26.6-4.9-53.5,9.6-63.5,34.1c-1.9,4.7-3.1,9.6-3.8,14.6c-5.9-6.9-13.7-12.2-22.7-14.8c-23.3-6.9-48,5.1-57.7,28.2 c-3,7.2-4.1,14.8-3.4,22.2c-15-7-33-8.2-49.3-2.1c-22.3,8.4-36.2,30.6-33.1,53.8c0.7,5.5,2.4,10.8,4.9,15.7 C19.9,252.3,5.2,270.3,1.3,291.5c-4.2,22.8,7.9,45.4,28.7,53.2c4.8,1.8,9.8,2.7,14.9,2.7c13.2,0,25.9-6,34-16.7 c-2.2,16.5,2.9,33.2,14.4,45.5c17,18.1,43.9,23.3,66.1,12.8c4.2-2,8-4.7,11.1-8.1c4.2,20.2,17.1,38.3,35.6,49.9 c24.4,15.3,56.2,13.1,78.5-4.6c1.2-1,2.4-2,3.5-3.1c-0.2,4.6-0.3,9.3,0,13.9c1.6,28.8,22.4,52.8,49.1,57.4 c26.7,4.6,53.5-10.1,63.2-34.7c1.8-4.6,2.9-9.5,3.5-14.3c6,6.7,13.9,11.8,22.9,14.2c23.3,6.3,47.8-6.1,57.1-29.4 c2.8-7.1,3.8-14.6,3-21.9c15,6.5,32.8,7.3,48.9,1c22-8.7,35.6-31.1,32.2-54.2c-0.8-5.3-2.6-10.5-5.2-15.3 C492.3,260.1,505.7,240.5,499.7,219.1z"/>`;
        
        const size = Math.random() * 15 + 10;
        leaf.style.width = size + 'px';
        leaf.style.left = (Math.random() * 120 - 20) + 'vw';
        
        const fallDuration = Math.random() * 8 + 6;
        const swayDuration = Math.random() * 2 + 3;
        
        leaf.style.animationDuration = `${fallDuration}s, ${swayDuration}s`;
        leaf.style.animationDelay = `-${Math.random() * 10}s`;

        container.appendChild(leaf);
        setTimeout(() => { leaf.remove(); }, fallDuration * 1000);
    }

    for(let i = 0; i < 30; i++) createMapleLeaf();
    setInterval(createMapleLeaf, 250);

    // Logic tính toán Tem
    function updatePreview(){
        const start = parseInt(document.getElementById('startCuon').value)||0;
        const end = parseInt(document.getElementById('endCuon').value)||0;
        let cuon = end - start + 1;
        if(cuon < 0) cuon = 0;
        let total = cuon * 2 + Math.ceil((cuon * 5) / 8);
        document.getElementById("previewCount").innerText = "Số tem dự kiến: " + total;
    }

    function taoLot(){
        const lotNo = document.getElementById('lotNo').value.trim();
        const startTay = parseInt(document.getElementById('startCuon').value);
        const endTay = parseInt(document.getElementById('endCuon').value);
        
        let allLabels = [];
        let pool = []; 

        for(let tay = startTay; tay <= endTay; tay++){
            let tayStr = String(tay).padStart(2, '0');
            allLabels.push(lotNo + tayStr + " /01-08");
            allLabels.push(lotNo + tayStr + " /09-16");
            for(let r = 17; r <= 21; r++){
                pool.push({tay: tayStr, roll: r});
            }
            while(pool.length >= 8){
                let pack8 = pool.splice(0, 8);
                allLabels.push(formatMixedLabel(lotNo, pack8));
            }
        }
        if(pool.length > 0){
            allLabels.push(formatMixedLabel(lotNo, pool));
        }
        render(allLabels);
    }

    function formatMixedLabel(lotNo, pack){
        let groups = {};
        pack.forEach(item => {
            if(!groups[item.tay]) groups[item.tay] = [];
            groups[item.tay].push(item.roll);
        });
        let lines = [];
        for(let tay in groups){
            let rolls = groups[tay];
            let range = rolls.length > 1 ? `${rolls[0]}-${rolls[rolls.length-1]}` : `${rolls[0]}`;
            lines.push(`${lotNo}${tay} /${range}`);
        }
        return lines.join("<br/>");
    }

    function render(allLabels){
        const rowsPerCol = 13;
        const colsPerPage = 3;
        const labelsPerPage = rowsPerCol * colsPerPage;
        let html = "";
        for(let pageStart = 0; pageStart < allLabels.length; pageStart += labelsPerPage){
            html += '<div class="page"><table class="print-table">';
            for(let row = 0; row < rowsPerCol; row++){
                html += "<tr>";
                for(let col = 0; col < colsPerPage; col++){
                    let index = pageStart + col * rowsPerCol + row;
                    html += "<td>" + (allLabels[index] || "") + "</td>";
                }
                html += "</tr>";
            }
            html += "</table></div>";
        }
        document.getElementById("result").innerHTML = html;
    }

    updatePreview();
</script>
</body>
</html>
